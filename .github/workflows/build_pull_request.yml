name: Build pull request

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: compile-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # Build against the matching public patcher source instead of requiring
      # access to the upstream organization's private Maven package.
      - name: Checkout Morphe patcher source
        run: git clone --depth 1 --branch v1.6.0 https://github.com/MorpheApp/morphe-patcher.git ../morphe-patcher

      - name: Checkout Morphe library source
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          git clone --depth 1 --branch v1.2.1 https://github.com/MorpheApp/jadb.git ../jadb
          (cd ../jadb && mvn -q install -DskipTests)
          git clone --depth 1 --branch v1.3.0 https://github.com/MorpheApp/morphe-library.git ../morphe-library
          chmod +x ../morphe-library/gradlew
          sed -i 's/gradle-8.9-bin.zip/gradle-9.4.1-bin.zip/' ../morphe-library/gradle/wrapper/gradle-wrapper.properties
          sed -i 's/^distributionSha256Sum=.*/distributionSha256Sum=2ab2958f2a1e51120c326cad6f385153bb11ee93b3c216c5fccebfdfbb7ec6cb/' ../morphe-library/gradle/wrapper/gradle-wrapper.properties
          sed -i 's/^    sign(publishing.publications)/    \/\/ sign(publishing.publications)/' ../morphe-library/build.gradle.kts
          (cd ../morphe-library && ./gradlew publishToMavenLocal --no-daemon --stacktrace \
            -x signKotlinMultiplatformPublication -x signAndroidReleasePublication)

      # This workflow intentionally creates a debug APK for every pull request.
      # It works both for branches in this repository and for external forks,
      # without requiring release-signing secrets. Releases are built separately
      # by release.yml.
      - name: Configure debug APK build
        id: build_config
        run: |
          echo "gradle_task=assembleDebug" >> "$GITHUB_OUTPUT"
          echo "apk_dir=app/build/outputs/apk/debug" >> "$GITHUB_OUTPUT"
          echo "apk_suffix=-debug" >> "$GITHUB_OUTPUT"
          echo "Building unsigned debug APK"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: burrunan/gradle-cache-action@v3

      - name: Build APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ENTRY_ALIAS: ${{ secrets.KEYSTORE_ENTRY_ALIAS }}
          KEYSTORE_ENTRY_PASSWORD: ${{ secrets.KEYSTORE_ENTRY_PASSWORD }}
          _JAVA_OPTIONS: "-Djava.awt.headless=true"
        run: |
          chmod +x ./gradlew
          ./gradlew ${{ steps.build_config.outputs.gradle_task }} --stacktrace

      - name: Rename APK
        run: |
          suffix="${{ steps.build_config.outputs.apk_suffix }}"
          for f in ${{ steps.build_config.outputs.apk_dir }}/*${suffix}.apk; do
            [ -e "$f" ] || continue
            mv "$f" "${f/${suffix}/}"
          done

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: ${{ steps.build_config.outputs.apk_dir }}/*.apk
